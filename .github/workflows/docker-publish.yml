name: Build & Push Docker Images

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  DOCKERHUB_NAMESPACE: mariomeosv40
  IMAGE_NAME: meos-seo-v6

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: frontend
            context: ./frontend
            build-args: |
              VITE_API_URL=https://seo.meosapp.de/api
          - name: backend
            context: ./backend
            build-args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}-${{ matrix.service.name }}:latest
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}-${{ matrix.service.name }}:${{ github.sha }}
          build-args: ${{ matrix.service.build-args }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max
