services:
  # ============================================================
  # PostgreSQL
  # ============================================================
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: meos_seo_v6
      POSTGRES_USER: meos
      POSTGRES_PASSWORD: ${DB_PASSWORD:-meos_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meos"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============================================================
  # Redis (BullMQ Job Queue)
  # ============================================================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============================================================
  # Backend (Node.js + Express)
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://meos:${DB_PASSWORD:-meos_secret}@db:5432/meos_seo_v6
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ============================================================
  # Frontend (React + Vite)
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:4000/api

volumes:
  pgdata:
  redisdata:
